services:
  archive-ledger-postgres:
    image: postgres:16
    container_name: archive-ledger-postgres
    environment:
      POSTGRES_DB: ${ARCHIVE_LEDGER_POSTGRES_DB:?ARCHIVE_LEDGER_POSTGRES_DB is required}
      POSTGRES_USER: ${ARCHIVE_LEDGER_POSTGRES_USER:?ARCHIVE_LEDGER_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${ARCHIVE_LEDGER_POSTGRES_PASSWORD:?ARCHIVE_LEDGER_POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - archive-ledger-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  archive-ledger:
    build:
      context: .
    container_name: archive-ledger
    environment:
      SPRING_PROFILES_ACTIVE: rc
      ARCHIVE_LEDGER_SERVER_ADDRESS: 0.0.0.0
      ARCHIVE_LEDGER_DB_URL: ${ARCHIVE_LEDGER_DB_URL:?ARCHIVE_LEDGER_DB_URL is required}
      ARCHIVE_LEDGER_DB_USERNAME: ${ARCHIVE_LEDGER_DB_USERNAME:?ARCHIVE_LEDGER_DB_USERNAME is required}
      ARCHIVE_LEDGER_DB_PASSWORD: ${ARCHIVE_LEDGER_DB_PASSWORD:?ARCHIVE_LEDGER_DB_PASSWORD is required}
      ARCHIVE_LEDGER_ALLOWED_ORIGINS: ${ARCHIVE_LEDGER_ALLOWED_ORIGINS:?ARCHIVE_LEDGER_ALLOWED_ORIGINS is required}
      ARCHIVE_TOKEN_MARKET_TO_LEDGER: ${ARCHIVE_TOKEN_MARKET_TO_LEDGER:?ARCHIVE_TOKEN_MARKET_TO_LEDGER is required}
      ARCHIVE_TOKEN_NEXUS_TO_LEDGER: ${ARCHIVE_TOKEN_NEXUS_TO_LEDGER:?ARCHIVE_TOKEN_NEXUS_TO_LEDGER is required}
      ARCHIVE_TOKEN_LOGISTICS_TO_LEDGER: ${ARCHIVE_TOKEN_LOGISTICS_TO_LEDGER:?ARCHIVE_TOKEN_LOGISTICS_TO_LEDGER is required}
      ARCHIVE_TOKEN_OS_TO_LEDGER: ${ARCHIVE_TOKEN_OS_TO_LEDGER:?ARCHIVE_TOKEN_OS_TO_LEDGER is required}
      ARCHIVE_TOKEN_AUTHENTICATED_READ: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:?ARCHIVE_TOKEN_AUTHENTICATED_READ is required}
      ARCHIVE_TOKEN_ADMIN_OPERATOR: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:?ARCHIVE_TOKEN_ADMIN_OPERATOR is required}
      ARCHIVE_LEDGER_SCHEDULER_ENABLED: ${ARCHIVE_LEDGER_SCHEDULER_ENABLED:-true}
      ARCHIVE_LEDGER_SETTLEMENT_SCHEDULER_ENABLED: ${ARCHIVE_LEDGER_SETTLEMENT_SCHEDULER_ENABLED:-true}
      ARCHIVE_LEDGER_RECONCILIATION_SCHEDULER_ENABLED: ${ARCHIVE_LEDGER_RECONCILIATION_SCHEDULER_ENABLED:-true}
      ARCHIVE_LEDGER_SCHEDULER_FIXED_DELAY_MS: ${ARCHIVE_LEDGER_SCHEDULER_FIXED_DELAY_MS:-60000}
      ARCHIVE_LEDGER_SCHEDULER_INITIAL_DELAY_MS: ${ARCHIVE_LEDGER_SCHEDULER_INITIAL_DELAY_MS:-15000}
      ARCHIVE_LEDGER_SETTLEMENT_DATE_OFFSET_DAYS: ${ARCHIVE_LEDGER_SETTLEMENT_DATE_OFFSET_DAYS:-0}
      ARCHIVE_LEDGER_RECONCILIATION_DATE_OFFSET_DAYS: ${ARCHIVE_LEDGER_RECONCILIATION_DATE_OFFSET_DAYS:-0}
      ARCHIVEOS_BASE_URL: ${ARCHIVEOS_BASE_URL:-http://host.docker.internal:4000}
      ARCHIVEOS_APPROVAL_ENABLED: ${ARCHIVEOS_APPROVAL_ENABLED:-false}
      ARCHIVEOS_RUNTIME_INGEST_ENABLED: ${ARCHIVEOS_RUNTIME_INGEST_ENABLED:-false}
      ARCHIVEOS_RUNTIME_INGEST_PATH: ${ARCHIVEOS_RUNTIME_INGEST_PATH:-/api/live-flow/events/ingest}
      ARCHIVEOS_RUNTIME_INGEST_SCHEDULER_ENABLED: ${ARCHIVEOS_RUNTIME_INGEST_SCHEDULER_ENABLED:-false}
      ARCHIVE_TOKEN_LEDGER_TO_OS: ${ARCHIVE_TOKEN_LEDGER_TO_OS:-}
    ports:
      - "127.0.0.1:${ARCHIVE_LEDGER_PORT:-18080}:18080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:18080/actuator/health > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 20s
    depends_on:
      archive-ledger-postgres:
        condition: service_healthy
    networks:
      - default
      - archive-runtime

volumes:
  archive-ledger-postgres-data:

networks:
  archive-runtime:
    external: true
    name: archive-runtime
