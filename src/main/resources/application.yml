spring:
  application:
    name: archive-ledger
  datasource:
    url: ${ARCHIVE_LEDGER_DB_URL:jdbc:postgresql://localhost:56543/archive_ledger}
    username: ${ARCHIVE_LEDGER_DB_USERNAME:archive_ledger}
    password: ${ARCHIVE_LEDGER_DB_PASSWORD:archive_ledger_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 2000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

archive-ledger:
  scheduler:
    enabled: ${ARCHIVE_LEDGER_SCHEDULER_ENABLED:false}
    settlement-enabled: ${ARCHIVE_LEDGER_SETTLEMENT_SCHEDULER_ENABLED:true}
    reconciliation-enabled: ${ARCHIVE_LEDGER_RECONCILIATION_SCHEDULER_ENABLED:true}
    fixed-delay-ms: ${ARCHIVE_LEDGER_SCHEDULER_FIXED_DELAY_MS:60000}
    initial-delay-ms: ${ARCHIVE_LEDGER_SCHEDULER_INITIAL_DELAY_MS:15000}
    settlement-date-offset-days: ${ARCHIVE_LEDGER_SETTLEMENT_DATE_OFFSET_DAYS:0}
    reconciliation-date-offset-days: ${ARCHIVE_LEDGER_RECONCILIATION_DATE_OFFSET_DAYS:0}
  archiveos:
    base-url: ${ARCHIVEOS_BASE_URL:http://host.docker.internal:4000}
    enabled: ${ARCHIVEOS_APPROVAL_ENABLED:false}
    timeout-ms: ${ARCHIVEOS_TIMEOUT_MS:2000}
  policy:
    approval-threshold-krw: ${ARCHIVE_LEDGER_APPROVAL_THRESHOLD_KRW:3000000}

archive:
  runtime:
    autorun:
      enabled: ${ARCHIVE_RUNTIME_AUTORUN_ENABLED:true}
    tick-interval: ${ARCHIVE_RUNTIME_TICK_INTERVAL:30s}
    initial-delay: ${ARCHIVE_RUNTIME_INITIAL_DELAY:10s}
    max-events-per-tick: ${ARCHIVE_RUNTIME_MAX_EVENTS_PER_TICK:10}
    max-backlog-per-tick: ${ARCHIVE_RUNTIME_MAX_BACKLOG_PER_TICK:50}
    callback-retry-limit: ${ARCHIVE_RUNTIME_CALLBACK_RETRY_LIMIT:3}

server:
  port: 18080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
